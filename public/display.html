<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ATEM Display Output</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #111; }
  #stage {
    position: absolute;
    overflow: hidden;
  }
  #canvas {
    width: 1920px; height: 1080px;
    position: absolute; top: 0; left: 0;
    transform-origin: top left;
  }
  #bg { position: absolute; inset: 0; z-index: 0; }
  #content { position: absolute; inset: 0; z-index: 1; overflow: hidden; }
  #user-css {}
  #url-frame {
    width: 100%; height: 100%;
    border: none;
    background: transparent;
    display: none;
  }
  #html-frame { width: 100%; height: 100%; border: none; background: transparent; display: none; }
  #image-content {
    width: 100%; height: 100%;
    display: none;
    align-items: center;
    justify-content: center;
  }
  #image-content img { width: 100%; height: 100%; object-position: center; }
  #idle {
    width: 100%; height: 100%;
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
    font-family: monospace;
    color: rgba(255,255,255,0.5);
    font-size: 32px;
    letter-spacing: 0.05em;
  }
  #idle .url { font-size: 48px; color: rgba(255,255,255,0.85); }
  #fade-overlay {
    position: absolute; inset: 0; z-index: 100;
    background: #000; opacity: 0; pointer-events: none;
    transition: opacity 0ms linear;
  }
</style>
</head>
<body>
<div id="stage">
  <div id="fade-overlay"></div>
  <div id="canvas">
    <div id="bg"></div>
    <style id="user-css"></style>
    <div id="content">
      <iframe id="url-frame" allowtransparency="true"></iframe>
      <iframe id="html-frame" allowtransparency="true"></iframe>
      <div id="image-content"><img id="image-el" src="" alt=""></div>
      <div id="idle">
        <div>Web UI</div>
        <div class="url" id="idle-url"></div>
      </div>
    </div>
  </div>
</div>

<script>
const WS_URL = `ws://${location.host}`;
let ws, reconnectTimer;
let adminUrl = `http://${location.hostname}:${location.port || 3000}`;
fetch('/api/info').then(r => r.json()).then(info => {
  adminUrl = `http://${info.hostname}.local:${info.port}`;
  document.getElementById('idle-url').textContent = adminUrl;
}).catch(() => {});

function scaleCanvas() {
  const scale = Math.min(window.innerWidth / 1920, window.innerHeight / 1080);
  const w = Math.round(1920 * scale);
  const h = Math.round(1080 * scale);
  const x = Math.round((window.innerWidth - w) / 2);
  const y = Math.round((window.innerHeight - h) / 2);
  const stage = document.getElementById('stage');
  const canvas = document.getElementById('canvas');
  stage.style.width = w + 'px';
  stage.style.height = h + 'px';
  stage.style.left = x + 'px';
  stage.style.top = y + 'px';
  canvas.style.transform = `scale(${scale})`;
}

function _applyConfig(cfg) {
  document.getElementById('bg').style.background = cfg.backgroundColor || '#000';
  document.getElementById('user-css').textContent = cfg.customCss || '';

  const frame = document.getElementById('url-frame');
  const htmlFrame = document.getElementById('html-frame');
  const imgDiv = document.getElementById('image-content');
  const img = document.getElementById('image-el');
  const idleDiv = document.getElementById('idle');

  frame.style.display = 'none';
  htmlFrame.style.display = 'none';
  imgDiv.style.display = 'none';
  idleDiv.style.display = 'none';

  if (cfg.mode === 'url' && cfg.url) {
    if (frame.src !== cfg.url) frame.src = cfg.url;
    frame.style.display = 'block';
  } else if (cfg.mode === 'html') {
    const doc = `<!DOCTYPE html><html><head><meta charset="UTF-8"><style>*{margin:0;padding:0;box-sizing:border-box;}html,body{width:100%;height:100%;overflow:hidden;background:transparent;}${cfg.customCss||''}</style></head><body>${cfg.html||''}</body></html>`;
    htmlFrame.srcdoc = doc;
    htmlFrame.style.display = 'block';
  } else if (cfg.mode === 'image' && cfg.imageUrl) {
    img.src = cfg.imageUrl;
    img.style.objectFit = cfg.imageFit || 'cover';
    imgDiv.style.display = 'flex';
  }

  if (cfg.showIdle !== false) {
    document.getElementById('idle-url').textContent = adminUrl;
    idleDiv.style.display = 'flex';
  }
}

function applyConfig(cfg, fadeDuration) {
  if (!fadeDuration) { _applyConfig(cfg); return; }
  const overlay = document.getElementById('fade-overlay');
  const half = fadeDuration / 2;
  overlay.style.transition = `opacity ${half}ms linear`;
  overlay.style.opacity = '1';
  setTimeout(() => {
    _applyConfig(cfg);
    overlay.style.opacity = '0';
  }, half);
}

let wsEverConnected = false;
function connect() {
  ws = new WebSocket(WS_URL);
  ws.onopen = () => {
    if (wsEverConnected) { location.reload(); return; }
    wsEverConnected = true;
  };
  ws.onmessage = (e) => {
    try {
      const msg = JSON.parse(e.data);
      if (msg.type === 'programUpdate') applyConfig(msg.config, msg.fadeDuration);
      if (msg.type === 'init') applyConfig(msg.programConfig);
    } catch {}
  };
  ws.onclose = () => {
    clearTimeout(reconnectTimer);
    reconnectTimer = setTimeout(connect, 2000);
  };
  ws.onerror = () => ws.close();
}

scaleCanvas();
window.addEventListener('resize', scaleCanvas);
fetch('/api/config').then(r => r.json()).then(applyConfig).catch(() => {});
connect();
</script>
</body>
</html>
