<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ATEM Display Output</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #111; }
  #stage {
    position: absolute;
    overflow: hidden;
  }
  #canvas {
    width: 1920px; height: 1080px;
    position: absolute; top: 0; left: 0;
    transform-origin: top left;
  }
  #bg { position: absolute; inset: 0; z-index: 0; }
  #content { position: absolute; inset: 0; z-index: 1; overflow: hidden; }
  #user-css {}
  #url-frame {
    width: 100%; height: 100%;
    border: none;
    background: transparent;
    display: none;
  }
  #html-content { width: 100%; height: 100%; display: none; }
  #image-content {
    width: 100%; height: 100%;
    display: none;
    align-items: center;
    justify-content: center;
  }
  #image-content img { width: 100%; height: 100%; object-position: center; }
  #idle {
    width: 100%; height: 100%;
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
    font-family: monospace;
    color: rgba(255,255,255,0.5);
    font-size: 32px;
    letter-spacing: 0.05em;
  }
  #idle .url { font-size: 48px; color: rgba(255,255,255,0.85); }
</style>
</head>
<body>
<div id="stage">
  <div id="canvas">
    <div id="bg"></div>
    <style id="user-css"></style>
    <div id="content">
      <iframe id="url-frame" allowtransparency="true"></iframe>
      <div id="html-content"></div>
      <div id="image-content"><img id="image-el" src="" alt=""></div>
      <div id="idle">
        <div>Admin panel</div>
        <div class="url" id="idle-url"></div>
      </div>
    </div>
  </div>
</div>

<script>
const WS_URL = `ws://${location.host}`;
let ws, reconnectTimer;

function scaleCanvas() {
  const scale = Math.min(window.innerWidth / 1920, window.innerHeight / 1080);
  const w = Math.round(1920 * scale);
  const h = Math.round(1080 * scale);
  const x = Math.round((window.innerWidth - w) / 2);
  const y = Math.round((window.innerHeight - h) / 2);
  const stage = document.getElementById('stage');
  const canvas = document.getElementById('canvas');
  stage.style.width = w + 'px';
  stage.style.height = h + 'px';
  stage.style.left = x + 'px';
  stage.style.top = y + 'px';
  canvas.style.transform = `scale(${scale})`;
}

function applyConfig(cfg) {
  document.getElementById('bg').style.background = cfg.backgroundColor || '#000';
  document.getElementById('user-css').textContent = cfg.customCss || '';

  const frame = document.getElementById('url-frame');
  const htmlDiv = document.getElementById('html-content');
  const imgDiv = document.getElementById('image-content');
  const img = document.getElementById('image-el');

  const idleDiv = document.getElementById('idle');
  frame.style.display = 'none';
  htmlDiv.style.display = 'none';
  imgDiv.style.display = 'none';
  idleDiv.style.display = 'none';

  if (cfg.mode === 'url' && cfg.url) {
    if (frame.src !== cfg.url) frame.src = cfg.url;
    frame.style.display = 'block';
  } else if (cfg.mode === 'html') {
    htmlDiv.innerHTML = cfg.html || '';
    htmlDiv.style.display = 'block';
  } else if (cfg.mode === 'image' && cfg.imageUrl) {
    img.src = cfg.imageUrl;
    img.style.objectFit = cfg.imageFit || 'cover';
    imgDiv.style.display = 'flex';
  } else if (cfg.mode === 'color') {
    // background colour only — no idle text
  } else if (cfg.mode === 'idle') {
    document.getElementById('idle-url').textContent = `${location.protocol}//${location.hostname}:${location.port || 3000}`;
    idleDiv.style.display = 'flex';
  }
  // url with no url, image with no imageUrl — just show background colour
}

let wsEverConnected = false;
function connect() {
  ws = new WebSocket(WS_URL);
  ws.onopen = () => {
    if (wsEverConnected) { location.reload(); return; }
    wsEverConnected = true;
  };
  ws.onmessage = (e) => {
    try {
      const msg = JSON.parse(e.data);
      if (msg.type === 'config') applyConfig(msg.config);
    } catch {}
  };
  ws.onclose = () => {
    clearTimeout(reconnectTimer);
    reconnectTimer = setTimeout(connect, 2000);
  };
  ws.onerror = () => ws.close();
}

scaleCanvas();
window.addEventListener('resize', scaleCanvas);
fetch('/api/config').then(r => r.json()).then(applyConfig).catch(() => {});
connect();
</script>
</body>
</html>
